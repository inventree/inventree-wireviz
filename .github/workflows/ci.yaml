name: CI Checks

on: ["push", "pull_request"]

jobs:
  style:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Deps
        run: |
          pip install invoke
          pip install -U ruff
          pip install -U wheel setuptools twine build
      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"
      - name: Style Checks
        run: |
          ruff check
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Build Plugin
        run: |
          python -m build
